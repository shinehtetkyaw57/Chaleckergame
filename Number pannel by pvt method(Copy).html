<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Checkers TH 🇹🇭 vs MM 🇲🇲</title>

<style>
body{
margin:0;
background:radial-gradient(circle at top,#2b2b2b,#111);
font-family:Segoe UI, sans-serif;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}
.wrapper{text-align:center;padding:20px}
#board{
display:grid;
grid-template-columns:repeat(8,60px);
grid-template-rows:repeat(8,60px);
margin:20px auto;
}
.cell{width:60px;height:60px;display:flex;justify-content:center;align-items:center}
.light{background:#e6d2b5}
.dark{background:#b58863}
.piece{width:40px;height:40px;border-radius:50%;cursor:pointer}
.red{background:red}
.black{background:black}
.king{border:3px solid gold}
button,input{padding:8px;margin:5px;border-radius:8px;border:none}
</style>
</head>
<body>

<div class="wrapper">

<h2>Thailand 🇹🇭 vs Myanmar 🇲🇲 Online Checkers</h2>

<input id="roomInput" placeholder="Room ID">
<button onclick="createRoom()">Create Room</button>
<button onclick="joinRoom()">Join Room</button>

<div>Turn: <span id="turn">BLACK</span></div>

<div id="board"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, update, onValue }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
apiKey: "AIzaSyAwAYD5NY0RcLKinqdF0Lo2iHut8MYVY2U",
authDomain: "airvat-4ca28.firebaseapp.com",
databaseURL: "https://airvat-4ca28-default-rtdb.firebaseio.com",
projectId: "airvat-4ca28",
storageBucket: "airvat-4ca28.appspot.com",
messagingSenderId: "427771613530",
appId: "1:427771613530:web:9e822b6c479c8661472363"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let roomId=null;
let playerColor=null;
let board=[];
let currentPlayer="black";
let selected=null;
let chain=false;

const boardEl=document.getElementById("board");
const turnEl=document.getElementById("turn");

/* ================= ROOM ================= */

window.createRoom=()=>{
roomId=document.getElementById("roomInput").value;
playerColor="black";
initBoard();
set(ref(db,"rooms/"+roomId),{
board:board,
turn:"black"
});
listen();
};

window.joinRoom=()=>{
roomId=document.getElementById("roomInput").value;
playerColor="red";
listen();
};

function listen(){
onValue(ref(db,"rooms/"+roomId),(snap)=>{
if(!snap.exists()) return;
const data=snap.val();
board=data.board;
currentPlayer=data.turn;
draw();
checkWinner();
});
}

/* ================= BOARD INIT ================= */

function initBoard(){
board=[];
for(let r=0;r<8;r++){
board[r]=[];
for(let c=0;c<8;c++){
if((r+c)%2===1){
if(r<3) board[r][c]={color:"red",king:false};
else if(r>4) board[r][c]={color:"black",king:false};
else board[r][c]=null;
}else board[r][c]=null;
}
}
}

/* ================= DRAW ================= */

function draw(){
boardEl.innerHTML="";
turnEl.textContent=currentPlayer.toUpperCase();

for(let r=0;r<8;r++){
for(let c=0;c<8;c++){
const cell=document.createElement("div");
cell.className="cell "+((r+c)%2?"dark":"light");
cell.onclick=()=>clickCell(r,c);

if(board[r][c]){
const p=document.createElement("div");
p.className="piece "+board[r][c].color;
if(board[r][c].king) p.classList.add("king");
cell.appendChild(p);
}
boardEl.appendChild(cell);
}
}
}

/* ================= GAME LOGIC ================= */

function clickCell(r,c){

if(currentPlayer!==playerColor) return;

if(selected){
if(move(selected.r,selected.c,r,c)){
if(chain && canCapture(r,c)){
selected={r:r,c:c};
}else{
selected=null;
chain=false;
switchTurn();
}
}
}else{
if(board[r][c] && board[r][c].color===playerColor){
if(mustCapture()){
if(canCapture(r,c)) selected={r:r,c:c};
}else selected={r:r,c:c};
}
}

draw();
}

function switchTurn(){
currentPlayer=currentPlayer==="black"?"red":"black";
update(ref(db,"rooms/"+roomId),{
board:board,
turn:currentPlayer
});
}

function mustCapture(){
for(let r=0;r<8;r++)
for(let c=0;c<8;c++)
if(board[r][c] && board[r][c].color===currentPlayer)
if(canCapture(r,c)) return true;
return false;
}

function canCapture(r,c){
const piece=board[r][c];
if(!piece) return false;

const dirs= piece.king ?
[[1,1],[1,-1],[-1,1],[-1,-1]] :
(piece.color==="black" ? [[-1,1],[-1,-1]] : [[1,1],[1,-1]]);

for(let [dr,dc] of dirs){
let mr=r+dr, mc=c+dc;
let tr=r+dr*2, tc=c+dc*2;

if(tr>=0&&tr<8&&tc>=0&&tc<8){
if(board[mr] && board[mr][mc] &&
board[mr][mc].color!==piece.color &&
!board[tr][tc]) return true;
}
}
return false;
}

function move(sr,sc,tr,tc){
if(!validMove(sr,sc,tr,tc)) return false;

const piece=board[sr][sc];
let dr=tr-sr;

if(Math.abs(dr)===2){
let mr=sr+dr/2;
let mc=sc+(tc-sc)/2;
board[mr][mc]=null;
chain=true;
}else chain=false;

board[tr][tc]=piece;
board[sr][sc]=null;

if(piece.color==="black" && tr===0) piece.king=true;
if(piece.color==="red" && tr===7) piece.king=true;

return true;
}

function validMove(sr,sc,tr,tc){
const piece=board[sr][sc];
if(!piece || board[tr][tc]) return false;

let dr=tr-sr;
let dc=tc-sc;

const dirs= piece.king ?
[[1,1],[1,-1],[-1,1],[-1,-1]] :
(piece.color==="black" ? [[-1,1],[-1,-1]] : [[1,1],[1,-1]]);

for(let [drr,dcc] of dirs){
if(dr===drr*2 && dc===dcc*2){
let mr=sr+drr, mc=sc+dcc;
if(board[mr] && board[mr][mc] &&
board[mr][mc].color!==piece.color) return true;
}
}

if(!chain && !mustCapture()){
for(let [drr,dcc] of dirs){
if(dr===drr && dc===dcc) return true;
}
}
return false;
}

/* ================= WINNER ================= */

function checkWinner(){
let red=0, black=0;
for(let r=0;r<8;r++)
for(let c=0;c<8;c++)
if(board[r][c]){
if(board[r][c].color==="red") red++;
else black++;
}

if(red===0 || black===0){
setTimeout(()=>{
alert((red===0?"BLACK":"RED")+" WINS!");
initBoard();
update(ref(db,"rooms/"+roomId),{
board:board,
turn:"black"
});
},300);
}
}

</script>
</body>
</html>
